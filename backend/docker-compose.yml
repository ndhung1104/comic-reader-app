services:
  postgres:
    image: postgres:16
    container_name: comicreader-postgres
    environment:
      POSTGRES_DB: comic_reader
      POSTGRES_USER: comic_user
      POSTGRES_PASSWORD: comic_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic_user -d comic_reader"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comicreader-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/comic_reader
      DB_USERNAME: comic_user
      DB_PASSWORD: comic_pass
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  pg_data:
  uploads_data:
