services:
  postgres:
    image: postgres:16
    container_name: comicreader-postgres-lowram
    env_file:
      - .env
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=20"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data

  comic-translate-worker:
    build:
      context: ./worker/comic-translate-worker
      dockerfile: Dockerfile
    container_name: comicreader-translate-worker
    environment:
      OCR_MODEL_DIR: /var/lib/comic-translate/models
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OCR_ORT_INTRA_OP_THREADS: "1"
      OCR_ORT_INTER_OP_THREADS: "1"
      PPOCR_REC_BATCH_SIZE: "2"
      OCR_MAX_IMAGE_SIDE: "1600"
      OCR_CROSS_ENGINE_FALLBACK: "false"
      WORKER_MAX_CONCURRENT_JOBS: "1"
      WORKER_IMAGE_FETCH_CONNECT_TIMEOUT_SECONDS: "10"
      WORKER_IMAGE_FETCH_READ_TIMEOUT_SECONDS: "45"
      WORKER_IMAGE_FETCH_MAX_RETRIES: "5"
      WORKER_IMAGE_FETCH_BACKOFF_SECONDS: "1.5"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 10m
    mem_limit: 2g
    restart: unless-stopped
    volumes:
      - worker_models:/var/lib/comic-translate/models

  kokoro-tts-worker:
    build:
      context: ./worker/kokoro-tts-worker
      dockerfile: Dockerfile
    container_name: comicreader-kokoro-tts-worker
    environment:
      KOKORO_STRICT_STARTUP: "false"
      KOKORO_SAMPLE_RATE: "24000"
      KOKORO_ENABLE_MODEL: "true"
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 2m
    mem_limit: 2g
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comicreader-backend-lowram
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      comic-translate-worker:
        condition: service_healthy
      kokoro-tts-worker:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/comic_reader
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx768m"
      TRANSLATION_WORKER_BASE_URL: http://comic-translate-worker:8090
      TTS_WORKER_BASE_URL: http://kokoro-tts-worker:8091
    ports:
      - "8080:8080"
    mem_limit: 1g
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  ollama:
    image: ollama/ollama:latest
    container_name: comicreader-ollama-lowram
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "5m"
    mem_limit: 2g
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pg_data:
  uploads_data:
  ollama_data:
  worker_models:
