spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/comic_reader}
    username: ${DB_USERNAME:comic_user}
    password: ${DB_PASSWORD:comic_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    validate-on-migrate: false
  jpa:
    show-sql: false

app:
  storage:
    upload-dir: /app/uploads

translation-worker:
  enabled: ${TRANSLATION_WORKER_ENABLED:false}
  base-url: ${TRANSLATION_WORKER_BASE_URL:http://comic-translate-worker:8090}

tts-worker:
  enabled: ${TTS_WORKER_ENABLED:false}
  base-url: ${TTS_WORKER_BASE_URL:http://piper-tts-worker:8091}
