spring:
  application:
    name: comic-reader
  profiles:
    default: local
  config:
    import: optional:file:.env[.properties]
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_THIS_SECRET_TO_A_LONG_RANDOM_STRING_1234567890ABCDEF}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

gemini:
  api-key: ${GEMINI_API_KEY:}

translate:
  provider: ${TRANSLATE_PROVIDER:gemini}
  fallback-provider: ${TRANSLATE_FALLBACK_PROVIDER:none}
  local:
    base-url: ${LOCAL_LLM_BASE_URL:http://host.docker.internal:11434}
    model: ${LOCAL_LLM_MODEL:qwen2.5:1.5b}
    timeout-ms: ${LOCAL_LLM_TIMEOUT_MS:30000}

translation-worker:
  enabled: ${TRANSLATION_WORKER_ENABLED:true}
  base-url: ${TRANSLATION_WORKER_BASE_URL:http://localhost:8090}
  timeout-ms: ${TRANSLATION_WORKER_TIMEOUT_MS:15000}

tts-worker:
  enabled: ${TTS_WORKER_ENABLED:true}
  base-url: ${TTS_WORKER_BASE_URL:http://localhost:8091}
  timeout-ms: ${TTS_WORKER_TIMEOUT_MS:300000}
  poll-interval-ms: ${TTS_WORKER_POLL_INTERVAL_MS:3000}
  max-poll-attempts: ${TTS_WORKER_MAX_POLL_ATTEMPTS:60}
  default-voice: ${TTS_DEFAULT_VOICE:vi_VN-vais1000-medium}
  voice-vi: ${TTS_VOICE_VI:vi_VN-vais1000-medium}
  voice-en: ${TTS_VOICE_EN:en_US-lessac-medium}
  voice-ja: ${TTS_VOICE_JA:en_US-lessac-medium}
  voice-ko: ${TTS_VOICE_KO:en_US-lessac-medium}
  fallback-voice: ${TTS_FALLBACK_VOICE:en_US-lessac-medium}
  default-speed: ${TTS_DEFAULT_SPEED:1.0}
  default-lang: ${TTS_DEFAULT_LANG:auto}
