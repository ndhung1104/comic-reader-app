spring:
  application:
    name: comic-reader
  profiles:
    default: local
  config:
    import: optional:file:.env[.properties]
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_THIS_SECRET_TO_A_LONG_RANDOM_STRING_1234567890ABCDEF}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
